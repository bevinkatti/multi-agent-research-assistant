# ============================================================
# docker-compose.yml
# Runs FastAPI + Streamlit as separate services
# Usage: docker-compose up --build
# ============================================================

version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: research-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist FAISS index and eval results across container restarts
      - ./data:/app/data
      - ./evaluation/results:/app/evaluation/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: research-frontend
    command: >
      streamlit run frontend/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Override API base URL to use Docker service name
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  faiss_data:
  eval_results: